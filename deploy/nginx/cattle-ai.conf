# ─────────────────────────────────────────────────────────────────────────────
# SudVet / Cattle-AI  —  Nginx reverse-proxy config
#
# Replace every occurrence of:
#   your-dashboard-domain.com  →  the domain that serves the Next.js dashboard
#   your-api-domain.com        →  the domain that serves the ops_api  (port 8002)
#   your-mobile-api-domain.com →  the domain that serves the mobile_api (port 8000)
#
# After installing, obtain TLS certificates with:
#   sudo certbot --nginx \
#     -d your-dashboard-domain.com \
#     -d your-api-domain.com \
#     -d your-mobile-api-domain.com
# ─────────────────────────────────────────────────────────────────────────────


# ── Redirect all HTTP to HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    server_name your-dashboard-domain.com your-api-domain.com your-mobile-api-domain.com;

    # Allow Let's Encrypt ACME challenge through plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ── Dashboard (Next.js — port 3000) ──────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name your-dashboard-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-dashboard-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-dashboard-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header X-XSS-Protection          "1; mode=block"                               always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}


# ── Ops API (FastAPI — port 8002) ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name your-api-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-api-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-api-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}


# ── Mobile API (FastAPI — port 8000) ─────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name your-mobile-api-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-mobile-api-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-mobile-api-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
